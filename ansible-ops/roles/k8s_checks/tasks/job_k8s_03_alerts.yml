---
# JOB-K8S-03 - Tao alert noi bo tu du lieu resource/event.

- name: JOB-K8S-03 | Initialize alerts
  ansible.builtin.set_fact:
    k8s_generated_alerts: []
  changed_when: false

- name: JOB-K8S-03 | Alert from warning events
  ansible.builtin.set_fact:
    k8s_generated_alerts: >-
      {{
        k8s_generated_alerts + [
          {
            'severity': 'warning',
            'check': 'k8s.warning_event',
            'target': item.get('metadata', {}).get('namespace', 'default') ~ '/' ~ item.get('involvedObject', {}).get('name', item.get('metadata', {}).get('name', 'unknown')),
            'message': item.get('reason', 'Warning') ~ ': ' ~ item.get('message', item.get('note', ''))
          }
        ]
      }}
  loop: "{{ k8s_warning_events | default([]) }}"
  changed_when: false

- name: JOB-K8S-03 | Alert from unhealthy nodes
  ansible.builtin.set_fact:
    k8s_generated_alerts: >-
      {{
        k8s_generated_alerts + [
          {
            'severity': 'critical' if item.1.type == 'Ready' else 'warning',
            'check': 'k8s.node.' ~ item.1.type,
            'target': item.0.metadata.name,
            'message': item.1.type ~ '=' ~ item.1.status ~ ' reason=' ~ (item.1.reason | default(''))
          }
        ]
      }}
  loop: "{{ (k8s_nodes | default({})).get('items', []) | subelements('status.conditions', skip_missing=True) }}"
  changed_when: false
  when:
    - (item.1.type == 'Ready' and item.1.status != 'True') or
      (item.1.type in ['MemoryPressure', 'DiskPressure', 'PIDPressure'] and item.1.status == 'True')

- name: JOB-K8S-03 | Alert from non-running pods
  ansible.builtin.set_fact:
    k8s_generated_alerts: >-
      {{
        k8s_generated_alerts + [
          {
            'severity': 'warning',
            'check': 'k8s.pod.phase',
            'target': item.get('metadata', {}).get('namespace', 'default') ~ '/' ~ item.get('metadata', {}).get('name', 'unknown'),
            'message': 'Pod phase=' ~ item.get('status', {}).get('phase', 'Unknown')
          }
        ]
      }}
  loop: "{{ (k8s_pods | default({})).get('items', []) }}"
  changed_when: false
  when: item.get('status', {}).get('phase', 'Unknown') not in ['Running', 'Succeeded']

- name: JOB-K8S-03 | Build report
  ansible.builtin.set_fact:
    k8s_job_03_report:
      job: JOB-K8S-03
      name: Kiem tra va tao canh bao
      host: "{{ inventory_hostname }}"
      status: >-
        {{
          'skipped'
          if (k8s_nodes is not defined and k8s_pods is not defined and k8s_warning_events is not defined)
          else (
            'critical'
            if (k8s_generated_alerts | selectattr('severity', 'equalto', 'critical') | list | length) > 0
            else ('warning' if (k8s_generated_alerts | length) > 0 else 'ok')
          )
        }}
      message: >-
        {{
          'SKIPPED - can chay JOB-K8S-01/02 truoc de co du lieu alert'
          if (k8s_nodes is not defined and k8s_pods is not defined and k8s_warning_events is not defined)
          else ('WARNING - co alert can kiem tra' if (k8s_generated_alerts | length) > 0 else 'OK - khong co alert noi bo')
        }}
      summary:
        alerts_total: "{{ k8s_generated_alerts | length }}"
        critical_alerts: "{{ k8s_generated_alerts | selectattr('severity', 'equalto', 'critical') | list | length }}"
        warning_alerts: "{{ k8s_generated_alerts | selectattr('severity', 'equalto', 'warning') | list | length }}"
      highlights:
        alerts: "{{ k8s_generated_alerts[:20] }}"
      next_actions: "{{ ['Xu ly alert trong highlights.alerts.'] if (k8s_generated_alerts | length) > 0 else ['Khong can hanh dong.'] }}"
  changed_when: false

- name: JOB-K8S-03 | Show report
  ansible.builtin.debug:
    var: k8s_job_03_report
  changed_when: false

- name: JOB-K8S-03 | Create local artifact directory
  ansible.builtin.file:
    path: "{{ k8s_check_artifact_dir }}/{{ inventory_hostname }}"
    state: directory
    mode: "0755"
  delegate_to: localhost
  become: false
  changed_when: false

- name: JOB-K8S-03 | Write job report to local artifact
  ansible.builtin.copy:
    dest: "{{ k8s_check_artifact_dir }}/{{ inventory_hostname }}/job_k8s_03_alerts.json"
    content: "{{ k8s_job_03_report | to_nice_json }}\n"
    mode: "0644"
  delegate_to: localhost
  become: false
  changed_when: false
