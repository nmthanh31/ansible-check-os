---
# JOB-K8S-01 - Kiem tra tai nguyen Kubernetes.

- name: JOB-K8S-01 | Read nodes
  ansible.builtin.command:
    cmd: "{{ k8s_check_kubectl }} --kubeconfig {{ k8s_check_kubeconfig }} get nodes -o json"
  register: k8s_nodes_json
  changed_when: false

- name: JOB-K8S-01 | Read pods
  ansible.builtin.command:
    cmd: "{{ k8s_check_kubectl }} --kubeconfig {{ k8s_check_kubeconfig }} get pods -A -o json"
  register: k8s_pods_json
  changed_when: false

- name: JOB-K8S-01 | Read top nodes by CPU
  ansible.builtin.command:
    cmd: "{{ k8s_check_kubectl }} --kubeconfig {{ k8s_check_kubeconfig }} top nodes --sort-by=cpu --no-headers"
  register: k8s_top_nodes_cpu
  changed_when: false
  failed_when: false

- name: JOB-K8S-01 | Read top nodes by memory
  ansible.builtin.command:
    cmd: "{{ k8s_check_kubectl }} --kubeconfig {{ k8s_check_kubeconfig }} top nodes --sort-by=memory --no-headers"
  register: k8s_top_nodes_memory
  changed_when: false
  failed_when: false

- name: JOB-K8S-01 | Read top pods by CPU
  ansible.builtin.command:
    cmd: "{{ k8s_check_kubectl }} --kubeconfig {{ k8s_check_kubeconfig }} top pods -A --sort-by=cpu --no-headers"
  register: k8s_top_pods_cpu
  changed_when: false
  failed_when: false

- name: JOB-K8S-01 | Read top pods by memory
  ansible.builtin.command:
    cmd: "{{ k8s_check_kubectl }} --kubeconfig {{ k8s_check_kubeconfig }} top pods -A --sort-by=memory --no-headers"
  register: k8s_top_pods_memory
  changed_when: false
  failed_when: false

- name: JOB-K8S-01 | Build resource facts
  ansible.builtin.set_fact:
    k8s_nodes: "{{ k8s_nodes_json.stdout | from_json }}"
    k8s_pods: "{{ k8s_pods_json.stdout | from_json }}"
  changed_when: false

- name: JOB-K8S-01 | Sum pod capacity
  ansible.builtin.set_fact:
    k8s_pods_capacity_total: "{{ (k8s_pods_capacity_total | default(0) | int) + (item.get('status', {}).get('capacity', {}).get('pods', 0) | int) }}"
    k8s_pods_allocatable_total: "{{ (k8s_pods_allocatable_total | default(0) | int) + (item.get('status', {}).get('allocatable', {}).get('pods', 0) | int) }}"
  loop: "{{ k8s_nodes.get('items', []) }}"
  changed_when: false

- name: JOB-K8S-01 | Build report
  ansible.builtin.set_fact:
    k8s_job_01_report:
      job: JOB-K8S-01
      name: Kiem tra tai nguyen Kubernetes
      host: "{{ inventory_hostname }}"
      status: "{{ 'warning' if (k8s_top_nodes_cpu.rc != 0 or k8s_top_pods_cpu.rc != 0) else 'ok' }}"
      message: "{{ 'WARNING - Metrics API khong day du' if (k8s_top_nodes_cpu.rc != 0 or k8s_top_pods_cpu.rc != 0) else 'OK - da thu thap tai nguyen Kubernetes' }}"
      summary:
        nodes: "{{ k8s_nodes.get('items', []) | length }}"
        pods_total: "{{ k8s_pods.get('items', []) | length }}"
        pods_running: "{{ k8s_pods.get('items', []) | selectattr('status.phase', 'equalto', 'Running') | list | length }}"
        pods_pending: "{{ k8s_pods.get('items', []) | selectattr('status.phase', 'equalto', 'Pending') | list | length }}"
        pods_failed: "{{ k8s_pods.get('items', []) | selectattr('status.phase', 'equalto', 'Failed') | list | length }}"
        pods_capacity_total: "{{ k8s_pods_capacity_total | default(0) }}"
        pods_allocatable_total: "{{ k8s_pods_allocatable_total | default(0) }}"
        metrics_api_available: "{{ k8s_top_nodes_cpu.rc == 0 and k8s_top_pods_cpu.rc == 0 }}"
      highlights:
        top_cpu_nodes: "{{ k8s_top_nodes_cpu.stdout_lines | default([]) }}"
        top_memory_nodes: "{{ k8s_top_nodes_memory.stdout_lines | default([]) }}"
        top_cpu_pods: "{{ (k8s_top_pods_cpu.stdout_lines | default([]))[:20] }}"
        top_memory_pods: "{{ (k8s_top_pods_memory.stdout_lines | default([]))[:20] }}"
        metrics_errors:
          nodes: "{{ k8s_top_nodes_cpu.stderr_lines | default([]) }}"
          pods: "{{ k8s_top_pods_cpu.stderr_lines | default([]) }}"
      next_actions: "{{ ['Kiem tra Metrics Server neu metrics_api_available=false.'] if (k8s_top_nodes_cpu.rc != 0 or k8s_top_pods_cpu.rc != 0) else ['Khong can hanh dong.'] }}"
  changed_when: false

- name: JOB-K8S-01 | Add raw data when enabled
  ansible.builtin.set_fact:
    k8s_job_01_report: "{{ k8s_job_01_report | combine({'raw': {'nodes': k8s_nodes, 'pods': k8s_pods}}, recursive=True) }}"
  changed_when: false
  when: k8s_check_include_raw | bool

- name: JOB-K8S-01 | Show report
  ansible.builtin.debug:
    var: k8s_job_01_report
  changed_when: false

- name: JOB-K8S-01 | Create local artifact directory
  ansible.builtin.file:
    path: "{{ k8s_check_artifact_dir }}/{{ inventory_hostname }}"
    state: directory
    mode: "0755"
  delegate_to: localhost
  become: false
  changed_when: false

- name: JOB-K8S-01 | Write job report to local artifact
  ansible.builtin.copy:
    dest: "{{ k8s_check_artifact_dir }}/{{ inventory_hostname }}/job_k8s_01_resources.json"
    content: "{{ k8s_job_01_report | to_nice_json }}\n"
    mode: "0644"
  delegate_to: localhost
  become: false
  changed_when: false
