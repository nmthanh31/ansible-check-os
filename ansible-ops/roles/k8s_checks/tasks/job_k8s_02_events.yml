---
# JOB-K8S-02 - Kiem tra event toan cum.

- name: JOB-K8S-02 | Read events
  ansible.builtin.command:
    cmd: "{{ k8s_check_kubectl }} --kubeconfig {{ k8s_check_kubeconfig }} get events -A -o json"
  register: k8s_events_json
  changed_when: false
  failed_when: false

- name: JOB-K8S-02 | Build event facts
  ansible.builtin.set_fact:
    k8s_events: "{{ (k8s_events_json.stdout | default('{\"items\":[]}', true) | from_json) if k8s_events_json.rc == 0 else {'items': []} }}"
  changed_when: false

- name: JOB-K8S-02 | Extract warning events
  ansible.builtin.set_fact:
    k8s_warning_events: "{{ k8s_events.get('items', []) | selectattr('type', 'equalto', 'Warning') | list }}"
  changed_when: false

- name: JOB-K8S-02 | Build report
  ansible.builtin.set_fact:
    k8s_job_02_report:
      job: JOB-K8S-02
      name: Kiem tra event toan cum
      host: "{{ inventory_hostname }}"
      status: "{{ 'skipped' if k8s_events_json.rc != 0 else ('warning' if (k8s_warning_events | length) > 0 else 'ok') }}"
      message: >-
        {{
          'SKIPPED - khong doc duoc Kubernetes events'
          if k8s_events_json.rc != 0
          else ('WARNING - cluster co Warning events' if (k8s_warning_events | length) > 0 else 'OK - khong thay Warning events')
        }}
      summary:
        warning_events: "{{ k8s_warning_events | length }}"
      highlights:
        warning_events_sample: >-
          {{
            k8s_warning_events[:20]
            | map(attribute='metadata')
            | list
          }}
        warning_messages_sample: "{{ k8s_warning_events[:20] | map(attribute='message') | list }}"
        error: "{{ k8s_events_json.stderr_lines | default([]) }}"
      next_actions: "{{ ['Mo warning_messages_sample de xem object/reason can xu ly.'] if (k8s_warning_events | length) > 0 else ['Khong can hanh dong.'] }}"
  changed_when: false

- name: JOB-K8S-02 | Add raw data when enabled
  ansible.builtin.set_fact:
    k8s_job_02_report: "{{ k8s_job_02_report | combine({'raw': {'events': k8s_events}}, recursive=True) }}"
  changed_when: false
  when: k8s_check_include_raw | bool

- name: JOB-K8S-02 | Show report
  ansible.builtin.debug:
    var: k8s_job_02_report
  changed_when: false

- name: JOB-K8S-02 | Create local artifact directory
  ansible.builtin.file:
    path: "{{ k8s_check_artifact_dir }}/{{ inventory_hostname }}"
    state: directory
    mode: "0755"
  delegate_to: localhost
  become: false
  changed_when: false

- name: JOB-K8S-02 | Write job report to local artifact
  ansible.builtin.copy:
    dest: "{{ k8s_check_artifact_dir }}/{{ inventory_hostname }}/job_k8s_02_events.json"
    content: "{{ k8s_job_02_report | to_nice_json }}\n"
    mode: "0644"
  delegate_to: localhost
  become: false
  changed_when: false
