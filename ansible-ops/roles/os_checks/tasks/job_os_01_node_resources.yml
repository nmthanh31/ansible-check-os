---
# JOB-OS-01 - Kiem tra tai nguyen node.
# Job nay tu thu thap du lieu va tao report ngan gon cua chinh no.

- name: JOB-OS-01 | Read CPU count
  ansible.builtin.command: nproc
  register: os_cpu_count
  changed_when: false

- name: JOB-OS-01 | Read load average
  ansible.builtin.command: cat /proc/loadavg
  register: os_loadavg
  changed_when: false

- name: JOB-OS-01 | Read memory and swap
  ansible.builtin.command: free -m
  register: os_memory
  changed_when: false

- name: JOB-OS-01 | Read filesystem usage
  ansible.builtin.command: df -PTh
  register: os_filesystems
  changed_when: false

- name: JOB-OS-01 | Read inode usage
  ansible.builtin.command: df -Pi
  register: os_inodes
  changed_when: false

- name: JOB-OS-01 | Detect read-only filesystems
  ansible.builtin.shell: findmnt -rn -o TARGET,OPTIONS | awk '$2 ~ /(^|,)ro(,|$)/ {print $0}'
  args:
    executable: /bin/bash
  register: os_readonly_filesystems
  changed_when: false
  failed_when: false

- name: JOB-OS-01 | Read top CPU processes
  ansible.builtin.shell: ps -eo pid,user,comm,%cpu,%mem --sort=-%cpu | head -n {{ os_check_top_process_count + 1 }}
  args:
    executable: /bin/bash
  register: os_top_cpu_processes
  changed_when: false

- name: JOB-OS-01 | Read top memory processes
  ansible.builtin.shell: ps -eo pid,user,comm,%cpu,%mem --sort=-%mem | head -n {{ os_check_top_process_count + 1 }}
  args:
    executable: /bin/bash
  register: os_top_memory_processes
  changed_when: false

- name: JOB-OS-01 | Build report
  ansible.builtin.set_fact:
    os_job_01_report:
      job: JOB-OS-01
      name: Kiem tra tai nguyen node
      host: "{{ inventory_hostname }}"
      status: "{{ 'warning' if (os_readonly_filesystems.stdout_lines | default([]) | length) > 0 else 'ok' }}"
      message: >-
        {{
          'WARNING - node co filesystem read-only can kiem tra'
          if (os_readonly_filesystems.stdout_lines | default([]) | length) > 0
          else 'OK - tai nguyen node da duoc thu thap'
        }}
      summary:
        cpu: "{{ os_cpu_count.stdout | int }} vCPU, load={{ os_loadavg.stdout.split()[0] }}/{{ os_loadavg.stdout.split()[1] }}/{{ os_loadavg.stdout.split()[2] }}"
        memory: "{{ os_memory.stdout_lines[1].split()[6] }}MB available / {{ os_memory.stdout_lines[1].split()[1] }}MB total"
        swap: "{{ os_memory.stdout_lines[2].split()[2] }}MB used / {{ os_memory.stdout_lines[2].split()[1] }}MB total"
        filesystems: "{{ (os_filesystems.stdout_lines | length) - 1 }} filesystems, read_only={{ os_readonly_filesystems.stdout_lines | default([]) | length }}"
      highlights:
        read_only_filesystems: "{{ os_readonly_filesystems.stdout_lines | default([]) }}"
        top_cpu_processes: "{{ (os_top_cpu_processes.stdout_lines | default([]))[1:] }}"
        top_memory_processes: "{{ (os_top_memory_processes.stdout_lines | default([]))[1:] }}"
      next_actions: >-
        {{
          ['Kiem tra ngay cac filesystem read-only trong highlights.read_only_filesystems.']
          if (os_readonly_filesystems.stdout_lines | default([]) | length) > 0
          else ['Khong can hanh dong.']
        }}
  changed_when: false

- name: JOB-OS-01 | Add raw data when enabled
  ansible.builtin.set_fact:
    os_job_01_report: >-
      {{
        os_job_01_report | combine(
          {
            'raw': {
              'memory': os_memory.stdout_lines | default([]),
              'filesystems': os_filesystems.stdout_lines | default([]),
              'inodes': os_inodes.stdout_lines | default([])
            }
          },
          recursive=True
        )
      }}
  changed_when: false
  when: os_check_include_raw | bool

- name: JOB-OS-01 | Show report
  ansible.builtin.debug:
    var: os_job_01_report
  changed_when: false

- name: JOB-OS-01 | Create local artifact directory
  ansible.builtin.file:
    path: "{{ os_check_artifact_dir }}/{{ inventory_hostname }}"
    state: directory
    mode: "0755"
  delegate_to: localhost
  become: false
  changed_when: false

- name: JOB-OS-01 | Write job report to local artifact
  ansible.builtin.copy:
    dest: "{{ os_check_artifact_dir }}/{{ inventory_hostname }}/job_os_01_node_resources.json"
    content: "{{ os_job_01_report | to_nice_json }}\n"
    mode: "0644"
  delegate_to: localhost
  become: false
  changed_when: false
