---
# JOB-OS-04 - Kiem tra SMART.
# Neu la VM va khong expose SMART device thi job tra ve skipped.

- name: JOB-OS-04 | Detect virtualization type
  ansible.builtin.command:
    cmd: systemd-detect-virt
  register: os_virtualization_type
  changed_when: false
  failed_when: false

- name: JOB-OS-04 | Check smartctl availability
  ansible.builtin.shell: command -v smartctl
  args:
    executable: /bin/bash
  register: os_smartctl_command
  changed_when: false
  failed_when: false

- name: JOB-OS-04 | Scan SMART devices
  ansible.builtin.command:
    cmd: smartctl --scan-open
  register: os_smart_scan
  changed_when: false
  failed_when: false
  when: os_smartctl_command.rc == 0

- name: JOB-OS-04 | Read SMART data
  ansible.builtin.command:
    cmd: smartctl -x {{ item.split()[0] }}
  loop: "{{ os_smart_scan.stdout_lines | default([]) | reject('match', '^\\s*$') | reject('match', '^#') | list }}"
  register: os_smart_data
  changed_when: false
  failed_when: false
  when:
    - os_smartctl_command.rc == 0
    - (os_smart_scan.stdout_lines | default([]) | length) > 0

- name: JOB-OS-04 | Build helper facts
  ansible.builtin.set_fact:
    os_smart_devices: "{{ os_smart_scan.stdout_lines | default([]) | reject('match', '^\\s*$') | reject('match', '^#') | list }}"
    os_smart_health_failed: >-
      {{
        (os_smart_data.results | default([]))
        | selectattr('stdout', 'defined')
        | selectattr('stdout', 'search', '(?i)(FAILED|critical warning:\\s*[1-9]|Media and Data Integrity Errors:\\s*[1-9])')
        | list
      }}
    os_virtualization_normalized: "{{ os_virtualization_type.stdout if os_virtualization_type.rc == 0 else 'none' }}"
  changed_when: false

- name: JOB-OS-04 | Build report
  ansible.builtin.set_fact:
    os_job_04_report:
      job: JOB-OS-04
      name: Kiem tra SMART
      host: "{{ inventory_hostname }}"
      status: >-
        {{
          'critical'
          if (os_smart_health_failed | length) > 0
          else (
            'skipped'
            if (os_smartctl_command.rc != 0 or (os_smart_devices | length) == 0)
            else 'ok'
          )
        }}
      message: >-
        {{
          'CRITICAL - SMART phat hien dau hieu loi disk'
          if (os_smart_health_failed | length) > 0
          else (
            'SKIPPED - thieu smartctl hoac VM khong expose SMART device'
            if (os_smartctl_command.rc != 0 or (os_smart_devices | length) == 0)
            else 'OK - SMART khong phat hien loi nghiem trong'
          )
        }}
      summary:
        virtualization: "{{ os_virtualization_normalized }}"
        smartctl_available: "{{ os_smartctl_command.rc == 0 }}"
        devices: "{{ os_smart_devices | length }}"
        health_failures: "{{ os_smart_health_failed | length }}"
      highlights:
        smart_devices: "{{ os_smart_devices }}"
        failures: "{{ os_smart_health_failed | map(attribute='stdout_lines') | list }}"
      next_actions: >-
        {{
          ['Xu ly SMART failure ngay.']
          if (os_smart_health_failed | length) > 0
          else (
            ['Neu skip vi thieu smartctl thi chay prepare_tools --tags smart_tools. Neu la VM khong expose SMART thi chap nhan skip.']
            if (os_smartctl_command.rc != 0 or (os_smart_devices | length) == 0)
            else ['Khong can hanh dong.']
          )
        }}
  changed_when: false

- name: JOB-OS-04 | Add raw data when enabled
  ansible.builtin.set_fact:
    os_job_04_report: "{{ os_job_04_report | combine({'raw': {'scan': os_smart_scan.stdout_lines | default([]), 'smart_data': os_smart_data.results | default([])}}, recursive=True) }}"
  changed_when: false
  when: os_check_include_raw | bool

- name: JOB-OS-04 | Show report
  ansible.builtin.debug:
    var: os_job_04_report
  changed_when: false

- name: JOB-OS-04 | Create local artifact directory
  ansible.builtin.file:
    path: "{{ os_check_artifact_dir }}/{{ inventory_hostname }}"
    state: directory
    mode: "0755"
  delegate_to: localhost
  become: false
  changed_when: false

- name: JOB-OS-04 | Write job report to local artifact
  ansible.builtin.copy:
    dest: "{{ os_check_artifact_dir }}/{{ inventory_hostname }}/job_os_04_smart.json"
    content: "{{ os_job_04_report | to_nice_json }}\n"
    mode: "0644"
  delegate_to: localhost
  become: false
  changed_when: false
