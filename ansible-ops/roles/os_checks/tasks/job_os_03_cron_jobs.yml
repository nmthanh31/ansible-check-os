---
# JOB-OS-03 - Kiem tra cron job OS.

- name: JOB-OS-03 | Read /etc/crontab
  ansible.builtin.command:
    cmd: cat /etc/crontab
  register: os_system_crontab
  changed_when: false
  failed_when: false

- name: JOB-OS-03 | Find files in /etc/cron.d
  ansible.builtin.find:
    paths: /etc/cron.d
    file_type: file
  register: os_cron_d_files
  changed_when: false
  failed_when: false

- name: JOB-OS-03 | List periodic cron scripts
  ansible.builtin.shell: |
    for d in /etc/cron.hourly /etc/cron.daily /etc/cron.weekly /etc/cron.monthly; do
      [ -d "$d" ] && find "$d" -maxdepth 1 -type f -printf '%p\n'
    done
  args:
    executable: /bin/bash
  register: os_periodic_cron_files
  changed_when: false
  failed_when: false

- name: JOB-OS-03 | Read systemd timers
  ansible.builtin.command:
    cmd: systemctl list-timers --all --no-pager --plain
  register: os_systemd_timers
  changed_when: false
  failed_when: false

- name: JOB-OS-03 | Build report
  ansible.builtin.set_fact:
    os_job_03_report:
      job: JOB-OS-03
      name: Kiem tra cron job OS
      host: "{{ inventory_hostname }}"
      status: ok
      message: OK - da thu thap cron va systemd timer
      summary:
        cron_d_files: "{{ os_cron_d_files.files | default([]) | length }}"
        periodic_cron_files: "{{ os_periodic_cron_files.stdout_lines | default([]) | length }}"
        systemd_timer_lines: "{{ os_systemd_timers.stdout_lines | default([]) | length }}"
      highlights:
        cron_d_files: "{{ os_cron_d_files.files | default([]) | map(attribute='path') | list }}"
        periodic_cron_files: "{{ os_periodic_cron_files.stdout_lines | default([]) }}"
        system_crontab_sample: "{{ (os_system_crontab.stdout_lines | default([]))[:20] }}"
        systemd_timers_sample: "{{ (os_systemd_timers.stdout_lines | default([]))[:20] }}"
      next_actions:
        - Kiem tra highlights neu can review cron/timer chi tiet.
  changed_when: false

- name: JOB-OS-03 | Add raw data when enabled
  ansible.builtin.set_fact:
    os_job_03_report: >-
      {{
        os_job_03_report | combine(
          {
            'raw': {
              'system_crontab': os_system_crontab.stdout_lines | default([]),
              'systemd_timers': os_systemd_timers.stdout_lines | default([])
            }
          },
          recursive=True
        )
      }}
  changed_when: false
  when: os_check_include_raw | bool

- name: JOB-OS-03 | Show report
  ansible.builtin.debug:
    var: os_job_03_report
  changed_when: false

- name: JOB-OS-03 | Create local artifact directory
  ansible.builtin.file:
    path: "{{ os_check_artifact_dir }}/{{ inventory_hostname }}"
    state: directory
    mode: "0755"
  delegate_to: localhost
  become: false
  changed_when: false

- name: JOB-OS-03 | Write job report to local artifact
  ansible.builtin.copy:
    dest: "{{ os_check_artifact_dir }}/{{ inventory_hostname }}/job_os_03_cron_jobs.json"
    content: "{{ os_job_03_report | to_nice_json }}\n"
    mode: "0644"
  delegate_to: localhost
  become: false
  changed_when: false
