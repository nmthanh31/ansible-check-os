---
# Ghi báo cáo OS JSON về máy control.
# Báo cáo được tách theo host và theo job để dễ đọc:
# - artifacts/os/<host>/job-os-01-resources.json
# - artifacts/os/<host>/job-os-02-event-logs.json
# - artifacts/os/<host>/job-os-03-cron-jobs.json
# - artifacts/os/<host>/job-os-04-smart.json
# - artifacts/os/<host>/os-summary.json
#
# Mặc định không ghi raw output dài. Nếu cần debug sâu:
#   -e os_check_include_raw=true

- name: OS report | Ensure host artifact directory exists on control node
  ansible.builtin.file:
    # Tạo thư mục riêng cho từng host: artifacts/os/<host>.
    # delegate_to: localhost đảm bảo ghi trên máy control, không ghi trên node.
    path: "{{ os_check_artifact_dir }}/os/{{ inventory_hostname }}"
    state: directory
    mode: "0755"
  delegate_to: localhost
  become: false
  changed_when: false

- name: OS report | Build JOB-OS-01 report
  ansible.builtin.set_fact:
    # Report riêng cho tài nguyên node.
    os_job_01_report:
      job: JOB-OS-01
      name: Kiểm tra tài nguyên node
      host: "{{ inventory_hostname }}"
      status:
        overall: >-
          {{
            'critical'
            if ((os_node_resource_findings | default([])) | selectattr('severity', 'equalto', 'critical') | list | length) > 0
            else (
              'warning'
              if ((os_node_resource_findings | default([])) | selectattr('severity', 'equalto', 'warning') | list | length) > 0
              else 'ok'
            )
          }}
      result:
        status_label: >-
          {{
            'CRITICAL - tai nguyen node co loi nghiem trong'
            if ((os_node_resource_findings | default([])) | selectattr('severity', 'equalto', 'critical') | list | length) > 0
            else (
              'WARNING - tai nguyen node can xem them'
              if ((os_node_resource_findings | default([])) | selectattr('severity', 'equalto', 'warning') | list | length) > 0
              else 'OK - tai nguyen node binh thuong'
            )
          }}
        action_required: "{{ (os_node_resource_findings | default([]) | length) > 0 }}"
      summary:
        - "vCPU={{ (os_node_resource_metrics | default({})).get('cpu_count', 0) }}, load_1m={{ (os_node_resource_metrics | default({})).get('load_1m', '0') }}"
        - "RAM total={{ (os_node_resource_metrics | default({})).get('memory_total_mb', 0) }}MB, available={{ (os_node_resource_metrics | default({})).get('memory_available_mb', 0) }}MB"
        - "Filesystem={{ (os_node_resource_metrics | default({})).get('filesystems_count', 0) }}, read_only={{ (os_node_resource_metrics | default({})).get('readonly_filesystems_count', 0) }}"
        - "Swap total={{ (os_node_resource_metrics | default({})).get('swap_total_mb', 0) }}MB, used={{ (os_node_resource_metrics | default({})).get('swap_used_mb', 0) }}MB"
      highlights:
        # Bo dong header cua ps, chi giu danh sach process that su.
        top_cpu_processes: "{{ ((os_node_resource_raw | default({})).get('top_cpu_processes', []))[1:] }}"
        top_memory_processes: "{{ ((os_node_resource_raw | default({})).get('top_memory_processes', []))[1:] }}"
        read_only_filesystems: "{{ (os_node_resource_raw | default({})).get('read_only_filesystems', []) }}"
      next_actions: >-
        {{
          ['Mo findings de xem tai nguyen vuot nguong hoac filesystem bat thuong.']
          if (os_node_resource_findings | default([]) | length) > 0
          else ['Khong can hanh dong.']
        }}
      metrics: "{{ os_node_resource_metrics | default({}) }}"
      findings: "{{ os_node_resource_findings | default([]) }}"
  changed_when: false

- name: OS report | Build JOB-OS-02 report
  ansible.builtin.set_fact:
    # Report riêng cho event log OS.
    os_job_02_report:
      job: JOB-OS-02
      name: Kiểm tra event log OS
      host: "{{ inventory_hostname }}"
      status:
        overall: >-
          {{
            'warning'
            if (((os_event_log_raw | default({})).get('kernel_errors', []) | length) > 0
                or (((os_event_log_raw | default({})).get('failed_services', []) | length) > 0)
                or (((os_event_log_raw | default({})).get('error_patterns', []) | length) > 0))
            else 'ok'
          }}
      result:
        status_label: >-
          {{
            'WARNING - OS co event log/failed service can kiem tra'
            if (((os_event_log_raw | default({})).get('kernel_errors', []) | length) > 0
                or (((os_event_log_raw | default({})).get('failed_services', []) | length) > 0)
                or (((os_event_log_raw | default({})).get('error_patterns', []) | length) > 0))
            else 'OK - khong thay event log OS bat thuong'
          }}
        action_required: >-
          {{
            (((os_event_log_raw | default({})).get('kernel_errors', []) | length) > 0)
            or (((os_event_log_raw | default({})).get('failed_services', []) | length) > 0)
            or (((os_event_log_raw | default({})).get('error_patterns', []) | length) > 0)
          }}
      summary:
        - "kernel_errors={{ ((os_event_log_raw | default({})).get('kernel_errors', [])) | length }}"
        - "failed_services={{ ((os_event_log_raw | default({})).get('failed_services', [])) | length }}"
        - "error_patterns={{ ((os_event_log_raw | default({})).get('error_patterns', [])) | length }}"
      highlights:
        # Lay mau cac dong quan trong de nguoi doc biet loi nao/service nao, khong chi nhin count.
        kernel_errors_sample: "{{ ((os_event_log_raw | default({})).get('kernel_errors', []))[:10] }}"
        failed_services_sample: "{{ ((os_event_log_raw | default({})).get('failed_services', []))[:10] }}"
        error_patterns_sample: "{{ ((os_event_log_raw | default({})).get('error_patterns', []))[:10] }}"
        samples_truncated:
          kernel_errors: "{{ (((os_event_log_raw | default({})).get('kernel_errors', [])) | length) > 10 }}"
          failed_services: "{{ (((os_event_log_raw | default({})).get('failed_services', [])) | length) > 10 }}"
          error_patterns: "{{ (((os_event_log_raw | default({})).get('error_patterns', [])) | length) > 10 }}"
      next_actions: >-
        {{
          ['Kiem tra failed service bang systemctl --failed va xem journalctl cho cac loi kernel/error pattern.']
          if (((os_event_log_raw | default({})).get('kernel_errors', []) | length) > 0
              or (((os_event_log_raw | default({})).get('failed_services', []) | length) > 0)
              or (((os_event_log_raw | default({})).get('error_patterns', []) | length) > 0))
          else ['Khong can hanh dong.']
        }}
      metrics:
        kernel_errors_count: "{{ ((os_event_log_raw | default({})).get('kernel_errors', [])) | length }}"
        failed_services_count: "{{ ((os_event_log_raw | default({})).get('failed_services', [])) | length }}"
        os_error_patterns_count: "{{ ((os_event_log_raw | default({})).get('error_patterns', [])) | length }}"
      findings: "{{ os_event_log_findings | default([]) }}"
  changed_when: false

- name: OS report | Build JOB-OS-03 report
  ansible.builtin.set_fact:
    # Report riêng cho cron/systemd timer.
    os_job_03_report:
      job: JOB-OS-03
      name: Kiểm tra cron job OS
      host: "{{ inventory_hostname }}"
      status:
        overall: ok
      result:
        status_label: "OK - da thu thap danh sach cron/systemd timer"
        action_required: false
      summary:
        - "cron.d files={{ ((os_cron_jobs_raw | default({})).get('cron_d_files', [])) | length }}"
        - "periodic cron files={{ ((os_cron_jobs_raw | default({})).get('periodic_cron_files', [])) | length }}"
        - "user crontabs checked={{ ((os_cron_jobs_raw | default({})).get('user_crontabs', [])) | length }}"
        - "systemd timer lines={{ ((os_cron_jobs_raw | default({})).get('systemd_timers', [])) | length }}"
      highlights:
        cron_d_files: "{{ ((os_cron_jobs_raw | default({})).get('cron_d_files', [])) | map(attribute='path') | list }}"
        periodic_cron_files: "{{ (os_cron_jobs_raw | default({})).get('periodic_cron_files', []) }}"
        system_crontab_sample: "{{ ((os_cron_jobs_raw | default({})).get('system_crontab', []))[:20] }}"
        systemd_timers_sample: "{{ ((os_cron_jobs_raw | default({})).get('systemd_timers', []))[:20] }}"
        systemd_timers_truncated: "{{ (((os_cron_jobs_raw | default({})).get('systemd_timers', [])) | length) > 20 }}"
      next_actions:
        - "Mo file job-os-03-cron-jobs.json voi os_check_include_raw=true neu can audit chi tiet noi dung cron."
      metrics:
        cron_d_files_count: "{{ ((os_cron_jobs_raw | default({})).get('cron_d_files', [])) | length }}"
        periodic_cron_files_count: "{{ ((os_cron_jobs_raw | default({})).get('periodic_cron_files', [])) | length }}"
        user_crontabs_checked: "{{ ((os_cron_jobs_raw | default({})).get('user_crontabs', [])) | length }}"
        systemd_timers_lines: "{{ ((os_cron_jobs_raw | default({})).get('systemd_timers', [])) | length }}"
      findings: "{{ os_cron_jobs_findings | default([]) }}"
  changed_when: false

- name: OS report | Build JOB-OS-04 report
  ansible.builtin.set_fact:
    # Report riêng cho SMART.
    os_job_04_report:
      job: JOB-OS-04
      name: Kiểm tra SMART
      host: "{{ inventory_hostname }}"
      status:
        overall: >-
          {{
            'critical'
            if ((os_smart_findings | default([])) | selectattr('severity', 'equalto', 'critical') | list | length) > 0
            else (
              'skipped'
              if (os_smart_skipped | default([]) | length) > 0
              else 'ok'
            )
          }}
      result:
        status_label: >-
          {{
            'CRITICAL - SMART phat hien dau hieu loi disk'
            if ((os_smart_findings | default([])) | selectattr('severity', 'equalto', 'critical') | list | length) > 0
            else (
              'SKIPPED - khong du dieu kien doc SMART'
              if (os_smart_skipped | default([]) | length) > 0
              else 'OK - SMART khong phat hien loi nghiem trong'
            )
          }}
        action_required: >-
          {{
            ((os_smart_findings | default([])) | selectattr('severity', 'equalto', 'critical') | list | length) > 0
          }}
      summary:
        - "smartctl_available={{ (os_smart_raw | default({})).get('smartctl_available', false) }}"
        - "should_run={{ (os_smart_raw | default({})).get('should_run', false) }}"
        - "devices={{ ((os_smart_raw | default({})).get('device_lines', [])) | length }}"
        - "findings={{ os_smart_findings | default([]) | length }}, skipped={{ os_smart_skipped | default([]) | length }}"
      highlights:
        smart_devices: "{{ (os_smart_raw | default({})).get('device_lines', []) }}"
        smart_findings: "{{ os_smart_findings | default([]) }}"
        skipped_reasons: "{{ os_smart_skipped | default([]) }}"
      next_actions: >-
        {{
          ['Xu ly findings SMART ngay; day co the la dau hieu disk sap loi.']
          if ((os_smart_findings | default([])) | selectattr('severity', 'equalto', 'critical') | list | length) > 0
          else (
            ['Neu skip vi thieu smartctl, chay playbooks/prepare_tools.yml. Neu la VM khong expose SMART thi chap nhan skip.']
            if (os_smart_skipped | default([]) | length) > 0
            else ['Khong can hanh dong.']
          )
        }}
      metrics:
        smartctl_available: "{{ (os_smart_raw | default({})).get('smartctl_available', false) }}"
        should_run: "{{ (os_smart_raw | default({})).get('should_run', false) }}"
        devices_count: "{{ ((os_smart_raw | default({})).get('device_lines', [])) | length }}"
        findings_count: "{{ os_smart_findings | default([]) | length }}"
        skipped_count: "{{ os_smart_skipped | default([]) | length }}"
      findings: "{{ os_smart_findings | default([]) }}"
      skipped: "{{ os_smart_skipped | default([]) }}"
  changed_when: false

- name: OS report | Add raw data to per-job reports when debug is enabled
  ansible.builtin.set_fact:
    os_job_01_report: "{{ os_job_01_report | combine({'raw': os_node_resource_raw | default({})}, recursive=True) }}"
    os_job_02_report: "{{ os_job_02_report | combine({'raw': os_event_log_raw | default({})}, recursive=True) }}"
    os_job_03_report: "{{ os_job_03_report | combine({'raw': os_cron_jobs_raw | default({})}, recursive=True) }}"
    os_job_04_report: "{{ os_job_04_report | combine({'raw': os_smart_raw | default({})}, recursive=True) }}"
  changed_when: false
  when: os_check_include_raw | bool

- name: OS report | Build summary report
  ansible.builtin.set_fact:
    # Summary là file nhỏ nhất để xem nhanh trạng thái một host.
    os_summary_report:
      host: "{{ inventory_hostname }}"
      status:
        overall: >-
          {{
            'critical'
            if os_job_01_report.get('status', {}).get('overall') == 'critical'
               or os_job_04_report.get('status', {}).get('overall') == 'critical'
            else (
              'warning'
              if os_job_01_report.get('status', {}).get('overall') == 'warning'
                 or os_job_02_report.get('status', {}).get('overall') == 'warning'
              else 'ok'
            )
          }}
      result:
        status_label: >-
          {{
            'CRITICAL - co loi OS can xu ly ngay'
            if os_job_01_report.get('status', {}).get('overall') == 'critical'
               or os_job_04_report.get('status', {}).get('overall') == 'critical'
            else (
              'WARNING - OS co diem can kiem tra'
              if os_job_01_report.get('status', {}).get('overall') == 'warning'
                 or os_job_02_report.get('status', {}).get('overall') == 'warning'
              else 'OK - OS nhin tong quan binh thuong'
            )
          }}
        action_required: >-
          {{
            os_job_01_report.get('status', {}).get('overall') in ['warning', 'critical']
            or os_job_02_report.get('status', {}).get('overall') == 'warning'
            or os_job_04_report.get('status', {}).get('overall') == 'critical'
          }}
      summary:
        - "JOB-OS-01 resources={{ os_job_01_report.get('status', {}).get('overall', 'unknown') }}"
        - "JOB-OS-02 event_logs={{ os_job_02_report.get('status', {}).get('overall', 'unknown') }}"
        - "JOB-OS-03 cron_jobs={{ os_job_03_report.get('status', {}).get('overall', 'unknown') }}"
        - "JOB-OS-04 smart={{ os_job_04_report.get('status', {}).get('overall', 'unknown') }}"
      next_actions: >-
        {{
          ['Mo cac file job co status warning/critical trong thu muc host nay.']
          if (
            os_job_01_report.get('status', {}).get('overall') in ['warning', 'critical']
            or os_job_02_report.get('status', {}).get('overall') == 'warning'
            or os_job_04_report.get('status', {}).get('overall') == 'critical'
          )
          else ['Khong can hanh dong.']
        }}
      jobs:
        JOB-OS-01:
          status: "{{ os_job_01_report.get('status', {}).get('overall', 'unknown') }}"
          file: "job-os-01-resources.json"
        JOB-OS-02:
          status: "{{ os_job_02_report.get('status', {}).get('overall', 'unknown') }}"
          file: "job-os-02-event-logs.json"
        JOB-OS-03:
          status: "{{ os_job_03_report.get('status', {}).get('overall', 'unknown') }}"
          file: "job-os-03-cron-jobs.json"
        JOB-OS-04:
          status: "{{ os_job_04_report.get('status', {}).get('overall', 'unknown') }}"
          file: "job-os-04-smart.json"
      key_metrics:
        cpu_count: "{{ os_job_01_report.get('metrics', {}).get('cpu_count', 0) }}"
        load_1m: "{{ os_job_01_report.get('metrics', {}).get('load_1m', '0') }}"
        memory_total_mb: "{{ os_job_01_report.get('metrics', {}).get('memory_total_mb', 0) }}"
        memory_available_mb: "{{ os_job_01_report.get('metrics', {}).get('memory_available_mb', 0) }}"
        readonly_filesystems_count: "{{ os_job_01_report.get('metrics', {}).get('readonly_filesystems_count', 0) }}"
        kernel_errors_count: "{{ os_job_02_report.get('metrics', {}).get('kernel_errors_count', 0) }}"
        failed_services_count: "{{ os_job_02_report.get('metrics', {}).get('failed_services_count', 0) }}"
        cron_d_files_count: "{{ os_job_03_report.get('metrics', {}).get('cron_d_files_count', 0) }}"
        smart_devices_count: "{{ os_job_04_report.get('metrics', {}).get('devices_count', 0) }}"
      highlights:
        top_cpu_processes: "{{ (os_job_01_report.get('highlights', {}).get('top_cpu_processes', []))[:5] }}"
        top_memory_processes: "{{ (os_job_01_report.get('highlights', {}).get('top_memory_processes', []))[:5] }}"
        failed_services_sample: "{{ os_job_02_report.get('highlights', {}).get('failed_services_sample', []) }}"
        error_patterns_sample: "{{ (os_job_02_report.get('highlights', {}).get('error_patterns_sample', []))[:5] }}"
        smart_devices: "{{ os_job_04_report.get('highlights', {}).get('smart_devices', []) }}"
  changed_when: false

- name: OS report | Save JOB-OS-01 report
  ansible.builtin.copy:
    content: "{{ os_job_01_report | to_nice_json }}"
    dest: "{{ os_check_artifact_dir }}/os/{{ inventory_hostname }}/job-os-01-resources.json"
    mode: "0644"
  delegate_to: localhost
  become: false

- name: OS report | Save JOB-OS-02 report
  ansible.builtin.copy:
    content: "{{ os_job_02_report | to_nice_json }}"
    dest: "{{ os_check_artifact_dir }}/os/{{ inventory_hostname }}/job-os-02-event-logs.json"
    mode: "0644"
  delegate_to: localhost
  become: false

- name: OS report | Save JOB-OS-03 report
  ansible.builtin.copy:
    content: "{{ os_job_03_report | to_nice_json }}"
    dest: "{{ os_check_artifact_dir }}/os/{{ inventory_hostname }}/job-os-03-cron-jobs.json"
    mode: "0644"
  delegate_to: localhost
  become: false

- name: OS report | Save JOB-OS-04 report
  ansible.builtin.copy:
    content: "{{ os_job_04_report | to_nice_json }}"
    dest: "{{ os_check_artifact_dir }}/os/{{ inventory_hostname }}/job-os-04-smart.json"
    mode: "0644"
  delegate_to: localhost
  become: false

- name: OS report | Save summary report
  ansible.builtin.copy:
    content: "{{ os_summary_report | to_nice_json }}"
    dest: "{{ os_check_artifact_dir }}/os/{{ inventory_hostname }}/os-summary.json"
    mode: "0644"
  delegate_to: localhost
  become: false

- name: OS report | Build all-node overview
  ansible.builtin.set_fact:
    os_all_summary_reports: "{{ groups['kubernetes_servers'] | map('extract', hostvars, 'os_summary_report') | select('defined') | list }}"
  run_once: true
  delegate_to: localhost
  become: false
  changed_when: false

- name: OS report | Save all-node overview
  ansible.builtin.copy:
    content: "{{ os_overview_report | to_nice_json }}"
    dest: "{{ os_check_artifact_dir }}/os/os-overview.json"
    mode: "0644"
  vars:
    os_overview_statuses: "{{ os_all_summary_reports | map(attribute='status.overall') | list }}"
    os_overview_report:
      scope: all_os_nodes
      result:
        status_label: >-
          {{
            'CRITICAL - it nhat mot node OS co loi nghiem trong'
            if 'critical' in os_overview_statuses
            else (
              'WARNING - it nhat mot node OS can kiem tra'
              if 'warning' in os_overview_statuses
              else 'OK - tat ca node OS nhin tong quan binh thuong'
            )
          }}
        action_required: "{{ ('critical' in os_overview_statuses) or ('warning' in os_overview_statuses) }}"
      summary:
        total_hosts: "{{ os_all_summary_reports | length }}"
        ok_hosts: "{{ os_overview_statuses | select('equalto', 'ok') | list | length }}"
        warning_hosts: "{{ os_overview_statuses | select('equalto', 'warning') | list | length }}"
        critical_hosts: "{{ os_overview_statuses | select('equalto', 'critical') | list | length }}"
      hosts: "{{ os_all_summary_reports }}"
      next_actions: >-
        {{
          ['Mo os-summary.json cua cac host co status warning/critical, sau do mo file job duoc gan trong truong jobs.']
          if ('critical' in os_overview_statuses) or ('warning' in os_overview_statuses)
          else ['Khong can hanh dong.']
        }}
  run_once: true
  delegate_to: localhost
  become: false
