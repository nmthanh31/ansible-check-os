---
# JOB-OS-02 - Kiem tra event log OS.

- name: JOB-OS-02 | Read kernel warnings/errors
  ansible.builtin.shell: |
    journalctl -k --since "{{ os_check_log_since }}" --priority=warning..alert --no-pager --quiet \
      | grep -Ev '^-- No entries --$|^\s*$' \
      || true
  args:
    executable: /bin/bash
  register: os_kernel_errors
  changed_when: false
  failed_when: false

- name: JOB-OS-02 | Read failed systemd services
  ansible.builtin.shell: |
    systemctl --failed --no-legend --no-pager --plain \
      | awk 'NF {print}' \
      || true
  args:
    executable: /bin/bash
  register: os_failed_services
  changed_when: false
  failed_when: false

- name: JOB-OS-02 | Read important OS error patterns
  ansible.builtin.shell: |
    journalctl --since "{{ os_check_log_since }}" --priority=warning..alert --no-pager --quiet \
      | grep -Ei 'I/O error|disk error|filesystem error|read-only file system|oom-killer|segfault|link is down|authentication failure|failed|failure|error|critical' \
      | grep -Evi 'ansible|sudo:.*ansible|Deactivated successfully|Consumed [0-9.]+s CPU time' \
      || true
  args:
    executable: /bin/bash
  register: os_error_patterns
  changed_when: false
  failed_when: false

- name: JOB-OS-02 | Prepare report helper values
  ansible.builtin.set_fact:
    os_log_highlight_limit: "{{ os_check_log_highlight_limit | int }}"
  changed_when: false

- name: JOB-OS-02 | Build report
  ansible.builtin.set_fact:
    os_job_02_report:
      job: JOB-OS-02
      name: Kiem tra event log OS
      host: "{{ inventory_hostname }}"
      status: >-
        {{
          'warning'
          if ((os_kernel_errors.stdout_lines | default([]) | length) > 0
              or (os_failed_services.stdout_lines | default([]) | length) > 0
              or (os_error_patterns.stdout_lines | default([]) | length) > 0)
          else 'ok'
        }}
      message: >-
        {{
          'WARNING - OS co kernel log/service/error pattern can xem'
          if ((os_kernel_errors.stdout_lines | default([]) | length) > 0
              or (os_failed_services.stdout_lines | default([]) | length) > 0
              or (os_error_patterns.stdout_lines | default([]) | length) > 0)
          else 'OK - khong thay OS event bat thuong'
        }}
      summary:
        kernel_warnings_errors: "{{ os_kernel_errors.stdout_lines | default([]) | length }}"
        failed_services: "{{ os_failed_services.stdout_lines | default([]) | length }}"
        matched_error_logs: "{{ os_error_patterns.stdout_lines | default([]) | length }}"
        shown_limit: "{{ os_log_highlight_limit }}"
      highlights:
        kernel_warnings_errors: "{{ (os_kernel_errors.stdout_lines | default([]))[:os_log_highlight_limit] }}"
        failed_services: "{{ (os_failed_services.stdout_lines | default([]))[:os_log_highlight_limit] }}"
        matched_error_logs: "{{ (os_error_patterns.stdout_lines | default([]))[:os_log_highlight_limit] }}"
        truncated:
          kernel_warnings_errors: "{{ (os_kernel_errors.stdout_lines | default([]) | length) > os_log_highlight_limit }}"
          failed_services: "{{ (os_failed_services.stdout_lines | default([]) | length) > os_log_highlight_limit }}"
          matched_error_logs: "{{ (os_error_patterns.stdout_lines | default([]) | length) > os_log_highlight_limit }}"
      next_actions: >-
        {{
          ['Kiem tra highlights.failed_services va highlights.matched_error_logs. Neu truncated=true thi chay lai voi -e os_check_include_raw=true.']
          if ((os_kernel_errors.stdout_lines | default([]) | length) > 0
              or (os_failed_services.stdout_lines | default([]) | length) > 0
              or (os_error_patterns.stdout_lines | default([]) | length) > 0)
          else ['Khong can hanh dong.']
        }}
  changed_when: false

- name: JOB-OS-02 | Add raw data when enabled
  ansible.builtin.set_fact:
    os_job_02_report: >-
      {{
        os_job_02_report | combine(
          {
            'raw': {
              'kernel_errors': os_kernel_errors.stdout_lines | default([]),
              'failed_services': os_failed_services.stdout_lines | default([]),
              'error_patterns': os_error_patterns.stdout_lines | default([])
            }
          },
          recursive=True
        )
      }}
  changed_when: false
  when: os_check_include_raw | bool

- name: JOB-OS-02 | Show report
  ansible.builtin.debug:
    var: os_job_02_report
  changed_when: false

- name: JOB-OS-02 | Create local artifact directory
  ansible.builtin.file:
    path: "{{ os_check_artifact_dir }}/{{ inventory_hostname }}"
    state: directory
    mode: "0755"
  delegate_to: localhost
  become: false
  changed_when: false

- name: JOB-OS-02 | Write job report to local artifact
  ansible.builtin.copy:
    dest: "{{ os_check_artifact_dir }}/{{ inventory_hostname }}/job_os_02_event_logs.json"
    content: "{{ os_job_02_report | to_nice_json }}\n"
    mode: "0644"
  delegate_to: localhost
  become: false
  changed_when: false
