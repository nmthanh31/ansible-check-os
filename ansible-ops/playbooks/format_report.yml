---
- name: Format readable report
  hosts: localhost
  connection: local
  become: false
  gather_facts: false

  tasks:
    - name: REPORT | Generate Markdown report from JSON artifacts
      ansible.builtin.command:
        cmd: >-
          {{ ansible_playbook_python }}
          {{ playbook_dir }}/../scripts/format_reports.py
          --artifact-dir {{ playbook_dir }}/../artifacts
          --output {{ playbook_dir }}/../artifacts/report.md
      changed_when: false
      tags:
        - report
